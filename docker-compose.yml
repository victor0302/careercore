version: "3.9"

networks:
  careercore-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careercore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careercore}
      POSTGRES_DB: careercore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careercore-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careercore -d careercore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - careercore-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (Object Storage) ──────────────────────────────────────────────────
  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO Console
    networks:
      - careercore-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── MinIO Init (creates bucket then exits) ─────────────────────────────────
  storage_init:
    image: minio/mc:latest
    depends_on:
      storage:
        condition: service_healthy
    networks:
      - careercore-net
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://storage:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/careercore-uploads;
        mc anonymous set download local/careercore-uploads;
        echo 'Bucket initialized.';
      "
    restart: "no"

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://careercore:careercore@db:5432/careercore
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: storage:9000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - careercore-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage_init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,ai_tasks
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://careercore:careercore@db:5432/careercore
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: storage:9000
    volumes:
      - ./backend:/app
    networks:
      - careercore-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage_init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - careercore-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
