name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AI_PROVIDER: mock
  APP_ENV: development
  DATABASE_URL: postgresql+asyncpg://careercore:careercore@localhost:5432/careercore
  REDIS_URL: redis://localhost:6379/0

jobs:
  # ── 1. Python Lint ───────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check backend/

  # ── 2. Python Type Check ─────────────────────────────────────────────────────
  typecheck-python:
    name: Type Check Python (mypy)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run mypy
        run: |
          cd backend
          mypy app/

  # ── 3. Backend Tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest
    needs: typecheck-python
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: careercore
          POSTGRES_PASSWORD: careercore
          POSTGRES_DB: careercore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      AI_PROVIDER: mock
      DATABASE_URL: postgresql+asyncpg://careercore:careercore@localhost:5432/careercore_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      FREE_TIER_DAILY_TOKEN_BUDGET: "50000"
      STANDARD_DAILY_TOKEN_BUDGET: "200000"
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: careercore-uploads
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      CORS_ORIGINS: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend

  # ── 4. Frontend Lint ─────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run eslint
        run: cd frontend && npx eslint src/

  # ── 5. Frontend Type Check ────────────────────────────────────────────────────
  typecheck-frontend:
    name: Type Check Frontend (tsc)
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tsc
        run: cd frontend && npx tsc --noEmit

  # ── 6. Frontend Tests ────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend (jest)
    runs-on: ubuntu-latest
    needs: typecheck-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run jest
        run: cd frontend && npm test -- --coverage --watchAll=false

  # ── 7. Security Scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: pip-audit
        run: |
          pip install pip-audit
          cd backend && pip install -e ".[dev]"
          pip-audit --requirement <(pip freeze) --ignore-vuln PYSEC-2022-43012
      - name: npm audit
        run: cd frontend && npm ci && npm audit --audit-level=high
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 8. Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build ./backend -f ./backend/Dockerfile -t careercore-backend:ci
      - name: Build frontend image
        run: docker build ./frontend -f ./frontend/Dockerfile -t careercore-frontend:ci
