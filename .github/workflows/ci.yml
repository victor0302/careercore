name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AI_PROVIDER: mock
  APP_ENV: development

jobs:
  # ── 0. Path filter ───────────────────────────────────────────────────────────
  # Decides which language-specific jobs need to run based on what this PR
  # actually touched. Keeps feedback fast on single-stack changes.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pyproject.toml'
            frontend:
              - 'frontend/**'
            docker:
              - '**/Dockerfile'
              - '**/Dockerfile.*'
              - 'docker-compose.yml'
            workflows:
              - '.github/workflows/**'

  # ── Backend ──────────────────────────────────────────────────────────────────
  # All three backend jobs run in parallel — no artificial dependency chain.
  # A slow test run should not block a 3-second ruff result.

  lint-backend:
    name: Backend — ruff
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check backend/

  typecheck-backend:
    name: Backend — mypy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run mypy
        run: |
          cd backend
          mypy app/

  test-backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: careercore
          POSTGRES_PASSWORD: careercore
          POSTGRES_DB: careercore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      AI_PROVIDER: mock
      DATABASE_URL: postgresql+asyncpg://careercore:careercore@localhost:5432/careercore_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      FREE_TIER_DAILY_TOKEN_BUDGET: "50000"
      STANDARD_DAILY_TOKEN_BUDGET: "200000"
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: careercore-uploads
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      CORS_ORIGINS: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # Same flattening: lint, typecheck, and test run in parallel.

  lint-frontend:
    name: Frontend — eslint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run eslint
        run: cd frontend && npx eslint src/

  typecheck-frontend:
    name: Frontend — tsc
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tsc
        run: cd frontend && npx tsc --noEmit

  test-frontend:
    name: Frontend — jest
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run jest
        run: cd frontend && npm test -- --coverage --watchAll=false

  # ── Security (PR-time) ──────────────────────────────────────────────────────
  # dependency-review-action runs on every PR and is strictly PR-scoped: it
  # only flags vulnerable dependencies introduced by the PR itself, not the
  # full transitive tree. Full-tree audit + gitleaks + Trivy live in
  # security.yml on a weekly schedule.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ── Docker build ─────────────────────────────────────────────────────────────
  # Gated on tests passing so we do not waste minutes building broken code.
  # Uses `if: !failure()` so it still runs when test jobs are skipped by the
  # path filter (e.g., frontend-only PR does not need a backend test result).
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: |
      always() &&
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      (needs.changes.outputs.docker == 'true' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build ./backend -f ./backend/Dockerfile -t careercore-backend:ci
      - name: Build frontend image
        run: docker build ./frontend -f ./frontend/Dockerfile -t careercore-frontend:ci

  # ── Aggregator ──────────────────────────────────────────────────────────────
  # One required status check in branch protection. Lets us add, remove, or
  # rename jobs above without touching branch protection rules — the only
  # required check is "CI / ci-complete".
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - lint-backend
      - typecheck-backend
      - test-backend
      - lint-frontend
      - typecheck-frontend
      - test-frontend
      - dependency-review
      - docker-build
    if: always()
    steps:
      - name: Verify all required jobs succeeded or were intentionally skipped
        run: |
          set -e
          declare -A results=(
            [lint-backend]="${{ needs.lint-backend.result }}"
            [typecheck-backend]="${{ needs.typecheck-backend.result }}"
            [test-backend]="${{ needs.test-backend.result }}"
            [lint-frontend]="${{ needs.lint-frontend.result }}"
            [typecheck-frontend]="${{ needs.typecheck-frontend.result }}"
            [test-frontend]="${{ needs.test-frontend.result }}"
            [dependency-review]="${{ needs.dependency-review.result }}"
            [docker-build]="${{ needs.docker-build.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            result="${results[$job]}"
            echo "$job: $result"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo "::error::One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed or were intentionally skipped."
